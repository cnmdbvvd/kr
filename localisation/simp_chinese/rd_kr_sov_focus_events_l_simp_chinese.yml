ussr_shoigu: "绍伊古国策树"
SOV_League_wide_Informatization_Plan: "全苏维埃信息化计划"
SOV_League_wide_Informatization_Plan_desc: "需要承认的是，我们目前的信息化服务并没有真正做到“科技为人民服务”这几个字,原先要做到的无纸化办公也进行的一团糟。先进的超级计算机，卫星通讯，宽带等，都没有得到很好的普及。所以在这全苏维埃信息化这一计划下，我们不仅要让信息化保卫我们的联盟，还要他惠及人民。"
SOV_Computers_assist in production: "计算机帮助生产"
SOV_Computers_assist in production_desc: "在执行计划经济的过程中，最忌讳的就是不必要的人工成本花费、工业生产中不必要的能耗、以及不必要的核算等问题。而计算机的运用，就恰好能帮我们解决这类问题，达到降本增效和提高工业水平的目的。"
SOV_Integrated_Circuit_Department: "集成电路部门"
SOV_Integrated_Circuit_Department_desc: "如果说计算机像是我们十四五计划中帮忙计算的大手，那集成电路部门就相当于这个大手的心脏。集成电路部门主要研发并制造电子业的各个芯片，是我们在计划中母庸置疑的核心部门。不过遗憾的的是，联盟目前的心脏有点老化了，为了使计算机在计划中高效运行，我们也必须保障这一“心脏”部门加快节奏。"
SOV_Expand_computer_talent_development: "扩大计算机人才培养"
SOV_Expand_computer_talent_development_desc: "原先的计算机学校和课程很明显满足不了我们目前的信息化需求，扩建学校和改变课程是我们在信息化上必要的进程。培养更多的人才也是给我们培养科学家做预备。"
SOV_Studying_advanced_foreign_programs: "学习外国先进计划"
SOV_Studying_advanced_foreign_programs_desc: "要想提升生产上的技术，最实在无非就自身研发和学习先进技术两种方式。我们要做的就是在培养计算机的人才同时学习先进技术，从而给自我研发提供经验和教训。所以我们要和英伟达、IBM、微软等外国大厂达成合作关系，以促成技术上的交流和学习"
SOV_Paperless_office: "无纸化办公"
SOV_Paperless_office_desc: "信息化最明显的成果已经体现出来了，我们的办公场所很难见到打印机和碎纸机了，大部分的公文和交流已经可以在计算机上交流并审批了。基本实现了“数字代替纸质”的目标。"
SOV_Restart_large_scale_project: "重启大规模工程"
SOV_Restart_large_scale_project_desc: "即便经济已经停滞，但我们的经济体量仍然巨大，只要通过大规模的项目来刺激生产，那么老旧的经济机器就会重新转动起来。同志们，拿起纸笔，我们要开工了。"
SOV_Improve_use_of_nuclear_energy: "完善核能利用"
SOV_Improve_use_of_nuclear_energy_desc: "原子能是具有广泛应用前景的能量，然而切尔诺贝利事件却让我们看到了它的破坏力，恰逢我们的新核电站工程开工，我们会召开发布会公开我们的核电站设计以及举行关停切尔诺贝利所有机组进行更大的石棺建造仪式，相信不久的未来，我们能够安全地控制原子能。"
SOV_Expand_advanced_heavy_industry: "扩大前沿重工业"
SOV_Expand_advanced_heavy_industry_desc: "在“十四五”计划中，我们进行了大量的对于生态恢复，生态建设的规划。为了更好的为计划服务，我们就要扩大生物工程、能源回收再利用、新能源相关的绿色科技工业工程建设。"
SOV_Novosibirsk_Plan: "新西伯利亚计划"
SOV_Novosibirsk_Plan_desc: "乌拉尔工业区在伟大的卫国战争期间爆发了惊人的潜力，在西伯利亚铁路附近的共青城如同纪念碑一样诉说着人类改造自然的伟力。我们会在这里建设新的工业基地，来满足苏联人民渴望的消费品，这里的重工业基础一定会帮大忙的。"
SOV_New_Cooperative_Law: "新合作社法案"
SOV_New_Cooperative_Law_desc: "在大部分产业被重新国有化和纳入计划体系后，我们要重新看待合作社这一特殊的、非国有的地方工业了。\n联盟的合作社的发展在斯大林时期便已有实践，这一特殊的生产组织形式在历史上已经证明了它能促进家庭收入增长、劳动效率提高。完成吸纳劳动力、掌握技术和补充我们经济中的商品部分的任务。通过新合作社法案将会鼓励新一批合作社的涌现，这些合作社将为苏维埃人民提供种类丰富的社会消费品和文化产品。\n“合作社，就是好，干部群众都想搞。\n"
SOV_New_Industrial_Zone in_Central_Asia: "中亚新工业区"
SOV_New_Industrial_Zone in_Central_Asia_desc: "中亚和联盟的其它部分没有什么不同，都有着丰富的资源，也有着恶劣的环境。早在半个世纪前，斯大林同志就在这里推行了农业集体化，开创了机械化的进程。而我们要做的是着眼当前地区发展，利用该地区的水、汽等丰富的资源，建设这片地区，克服恶劣的环境，掀起一轮新的工业化高潮！"
SOV_Restart_Stalin_nature_transformation_plan: "重启斯大林的大自然改造计划"
SOV_Restart_Stalin_nature_transformation_plan_desc: "“伟大的斯大林自然改造计划”是斯大林同志为了永久性解决土壤水土流失而指定的宏伟计划，它横跨三个五年计划，通过建造8个巨大的森林保护区和4.42万个水利设施，能保证1.2亿公顷耕地的高产。到四五计划结束的时候，国内肉类、牛奶和羊毛产量都超过了战前水平，经过落实这些宏伟计划的第一批政策，使得谷物产量大幅增长 25-30%，蔬菜产量大幅增长 50-75%，饲料产量大幅增长100-200%，很可惜，如此行之有效且可行的计划被赫鲁晓夫无情的破坏了。我们要重拾这个计划，以便在未来的五年内彻底解决粮食问题。"
SOV_Optimize_military_spending: "优化军费支出"
SOV_Optimize_military_spending_desc: "为了使我们的国民经济更加平衡，在军事方面的竞赛不可避免的要进行减少，首先要停止过去不做计划进行的滥造武器装备的现象。通过有目的的计划和国防经费的拨付，军队才能决定制造多少装备。"
SOV_Labor_productivity_indicator: "劳动生产率指标"
SOV_Labor_productivity_indicator_desc: "在过去的经济计划中，我们不难看到各种人力成本浪费而减少产出的例子，在过去受生产力各类原因也许较多，但如今的生产力也不是几十年前能比的了。自然，我们要在计划中广泛利用劳动量化生产率指标来进行指标是否合理的衡量。同样的，要阐明的是，完成指标不是主要目的，完成计划才是。"
SOV_Reduce_imports_foreign_grain: "减少外国粮食进口"
SOV_Reduce_imports_foreign_grain_desc: "由于赫鲁晓夫失败的农业改革，勃列日涅夫纵容的大量腐败导致的粮食被走私，还有戈尔巴乔夫和亚纳耶夫失败的改革。我们的粮食贸易在这几十年来一直保持着严重的逆差，这也就导致了我们每年要花大把的卢布来买别国的粮食，有时甚至还不够吃。而在我们推进了一系列回复措施和有效的改革后，我们如今可以自豪地宣布：苏联人已经牢牢的握住了自己的饭碗。"
SOV_Restart_Technical_Exchange: "重启技术交流"
SOV_Restart_Technical_Exchange_desc: "一些人扬言没有市场竞争就没有改进产品的动力，这是完全的谬误。二十年代，工业生产会议这一新事物在列宁格勒出现。工业生产会议成为了改善生产和提高劳动生产率的法宝。与会工人可以在会议上发表自己的意见和建议，优秀的工人还会被吸收到管理层。随后，会议的规模也越来越大，从车间的会议到工厂的会议，再到企业的联席会议。这不仅有利于生产还有利于培养工人的主人翁意识和管理水平，我们会改革会议组织，让这一盛举再现！"
SOV_Agricultural_Informatization: "农业信息化"
SOV_Agricultural_Informatization_desc: "这是我们在“十四五”计划的农业中走的最后一步棋，我们要把信息技术这一先进生产力运用到农业中来。先进的计算机可以帮助我们优化种植，养殖，农产品流通等多个领域的进行。让我国的农业从业者成为世界上最先进，最有效的生产者。"
SOV_trade: "对苏贸易"

