#国策
SOV_Three_Year_Plan_for_Economic_Revival: "经济复兴三年计划"
SOV_The_Return_of_the_Accounting_Ruble: "记账卢布的回归"
SOV_Reform_the_State_Planning_Commission: "改革国家计划部委"
SOV_Eliminate_economic_parasites: "消灭经济寄生虫"
SOV_The_economic_sector_is_completely_renewed: "经济部门焕然一新"
SOV_Soviet_economic_statistical_system: "苏联经济统计制度"
SOV_Revising_the_textbook_of_political_economy: "修订政治经济学教科书  "
SOV_Optimize_enterprise_accounting_mechanisms: "优化企业核算机制"
SOV_Clarify_the_principles_of_physical_indicators: "明确实物指标原则"
SOV_Oriented_towards_the_tertiary_industry: "转向第三产业"
SOV_Technical_cadres_decide_everything: "技术和干部决定一切"
SOV_Encourage_technological_innovation: "鼓励技术创新"
SOV_Brand_new_fourteen_Five_Year_Plan: "崭新的十四五计划"
SOV_Three_Year_Plan_for_Economic_Revival_desc: "三年计划是计划经济国家特定领域设定的中长期目标和实施方案。由于上世纪末期苏联社会的种种乱象，我们的国民经济已经趋于崩溃，是时候着手恢复和重建我们的经济体系了。在经济复苏三年计划里，我们将通过一系列改革措施缔造我们崭新的政治经济体系，让苏维埃的红星在二十一世纪的天空熠熠生辉。\n§r为了她那飘扬的鲜红旗帜，我们永远忠诚无私地屹立。"
SOV_The_Return_of_the_Accounting_Ruble_desc: "在经历了戈尔巴乔夫与亚纳耶夫失败的市场化改革后，记账卢布也不可避免地随着濒临崩溃的经济体制走向了消亡。为了重建社会主义经济，在我们经济复苏三年计划里，我们首先要做的就是恢复这种过去记录产品价格的方法，来免去在经济核算中不必要的交易。 "
SOV_Reform_the_State_Planning_Commission_desc: "修正主义者们粉碎了完整的经济计划，把苏联经济分裂成一个个部门和地区。这导致了无意义的部门斗争和越来越畸形的财政，我们必须改变这种现状，让经济计划破镜重圆，这会让很多尝到甜头的干部反对，这不要紧，因为年轻的富有奉献精神和热情的干部会代替他们"
SOV_Eliminate_economic_parasites_desc: "我国的生产方式是公有制，然而自从赫鲁晓夫时代开始，直到戈尔巴乔夫试图将其摧毁，国家在事实上变成了一种国家资本主义，各个地区的部门掌控了生产资料。本应该为苏联人民服务的干部如今却理所当然地搜刮民脂民膏！我们会动员群众配合内务部让这些寄生虫消失！"
SOV_The_economic_sector_is_completely_renewed_desc: "在稳步推进政治的整肃与基础性的经济改革后，我们终于能够自豪的宣布经济部门恢复了正常运转。不过这对于我们最终恢复目标来说还差的远，在崭新部门的基础上，我们要推进核算机制与技术和干部决定一切的相关改革，来达到恢复经济的目的。"
SOV_Soviet_economic_statistical_system_desc: "我们的经济计划需要各个工厂的信息，可惜由于修正主义者的改革，中央统计局的数据一直不是很准确，莫斯科的经济学家们不能写出完美的方案。我们会整合所有工厂的报表，而克格勃很高兴能帮助我们保证这次报表的真实性。"
SOV_Revising_the_textbook_of_political_economy_desc: "修订政治经济学教科书是老生常谈的问题了，早在1952年斯大林同志就给出了相关的改善建议。我们不仅要让政治经济教科书不那么冗长，也不要让“利润挂帅”这一错误的思想毒害我们的青年。我们也要采纳毛派朋友们的建议，把他们的理论补充到之前斯大林政治经济学没有完善的地方（如消除体脑劳动相关）。"
SOV_Optimize_enterprise_accounting_mechanisms_desc: "无论是65年进行的生产资产付费改革，还是87年那份阐述“完全核算机制”的可笑文件，都无疑是给赫鲁晓夫时代以后的经济修正主义道路添砖加瓦。我们既然要在坚持社会主义道路的前提下来完善我们的企业核算机制，就要以独立资金、收支平衡、成本核算为基础，优化其中的核算机制，从而减少在其运作中出现的损耗情况。"
SOV_Clarify_the_principles_of_physical_indicators_desc: "斯大林同志认为实物指标可以有消灭商品经济的作用，除此之外，事实证明，在赫鲁晓夫和柯西金使用利润、价格代替了实物指标后，工厂利用漏洞少生产商品，只生产高利润商品，拒绝沟通交流技术等行为比比皆是，最后导致了计划的崩溃，腐败和黑市的成长，商品的短期。如不纠正错误，那么联盟的生命就会走到尽头！"
SOV_Oriented_towards_the_tertiary_industry_desc: "斯大林时代人民的生活是多姿多彩的，电影、广播、疗养院、图书馆、体育宫等娱乐设施满足人民的精神需求，如今我们也要大力发展娱乐项目，让人民的休息时间更加有趣。"
SOV_Technical_cadres_decide_everything_desc: "苏联的一长制不是赫鲁晓夫鼓捣出来的，也不是斯大林发明出来的，而是受到了列宁的肯定。一长制是一人负责，集体领导，这要求我们培养有智慧的工人干部，并且号召群众批判腐化的堕落干部。斯大林也说如果有大量优秀的干部，苏联就是不可战胜的。我们必须清洗这些年老迟钝腐败的干部，用年轻有活力的共产主义干部代替他们，现在就这么做！"
SOV_Encourage_technological_innovation_desc: "勃列日涅夫时代的企业往往把科技创新看做是无关紧要的东西，没人会主动去改变现有的生产办法。然而斯大林时代又不一样，我们将确保任何人的发明创造都会被看到，同时，如果这项发明能帮助我们生产，那么他会得到相应的奖金，丰厚无比的奖金。"
SOV_Brand_new_fourteen_Five_Year_Plan_desc: "亚纳耶夫任职时的十四五计划颇有勃列日涅夫的腐朽，那股市场味儿都能把人熏死。通过分析克格勃查出来的较为真实的统计数据，我们会制定更加科学的计划，过去的反复修改计划、产值指标、以及那些令人作呕的腐败交易都会消失的，应该是这样的。"

SOV_He_was_reappointed_as_the_helm_of_the_ship: "重掌航舵"
SOV_He_was_reappointed_as_the_helm_of_the_ship_desc: "自1953年斯大林逝世以来，联盟已经失去方向太久了。粗鲁的空想家、腐化的党员、资本主义的呐喊者、资产阶级的话事人，若是任由联盟继续在错误的道路上前进，后果只能是红旗落地。如今，斯大林的继承者们掌握了名为苏维埃的巨轮，我们会将联盟带出暗礁，重回革命灯塔的地位。听啊，舵手已经下了命令：左满舵！"
SOV_Where_is_the_future: "未来何去何从"
SOV_Where_is_the_future_desc: "以史为镜，可以知兴替。对联盟历史做出盖棺定论的判决是解决迷茫的好办法。再过去，列宁和斯大林也经历过这样那样的路线斗争，同各路修正主义者和自由主义者决裂。现在我们不仅要和这些敌人斗争，更要团结同志们做出对未来的计划，最后，统一思想、团结一致的党会焕发出巨大的力量。"
SOV_Rehabilitate_Stalin: "平反斯大林"
SOV_Rehabilitate_Stalin_desc: "赫鲁晓夫这个修正主义头子，他对斯大林的批判，也就是臭名昭著的秘密报告，完全是个人情感的宣泄！不仅没能做到逻辑严密，甚至毫不尊重客观事实，这样的报告我们绝对不认！我们会重新评估斯大林同志的功过是非，把颠倒的历史再颠倒过来。"
SOV_Mr_Grand_Marshal: "军中元帅"
SOV_Mr_Grand_Marshal_desc: "在过去，军队并不能算是直接控制社会的组织，然而819政变过后，军队愈发热情地参与到了国家事务当中。在法律层面的危害暂且不谈，军队力量的强大也导致我们不得不小心地处理亚佐夫这样的军人。政治是妥协的艺术，一场洽谈会解决一些问题的，起码是暂时解决"
SOV_A_clear_stream_of_intellectuals: "知识分子的清流"
SOV_A_clear_stream_of_intellectuals_desc: "在青年人普遍不相信社会主义的现在，仍有很多知识分子怀揣着共产主义的信仰，用马列主义的思想创作批判的武器。理查德·伊万诺维奇·科索拉波夫，和我们一样是斯大林同志的继承者，他因批判戈尔巴乔夫而被边缘化，但如今我们将确保他在学术界的地位，从而让学术界焕发出新的，属于马列主义的生机。"
SOV_Revisionism_is_re_criticized: "修正主义再批判"
SOV_Revisionism_is_re_criticized_desc: "什么是修正主义，这个词在中苏论战的时候一直出现，那些否定无产阶级专政，否定社会主义公有制，打着马列主义的旗帜反对马列的，就是修正主义。从伯恩施坦到考茨基、从赫鲁晓夫到勃列日涅夫，再到今天的改革派和军国派，这些人无不在否定马列主义，我们必须和这些人划清界限"
SOV_Young_people_from_the_Kremlin: "克宫里的年轻人"
SOV_Young_people_from_the_Kremlin_desc: "批判的武器代替不了武器的批判，不把这些修正主义者从党内移除，党就不能算是工人阶级的先锋队。好在我们找到了一位盟友帮助我们，富有爱国情怀的普京，尽管在意识形态上有些人对他颇有微词，但是在业务方面他绝对是无可指摘的。"
SOV_The_last_day: "最后一日"
SOV_The_last_day_desc: "尽管保守分子和军国派我们暂时无法彻底根除，但是我们有着共同的敌人，那些改革派。雷日科夫作为一个自由主义分子，是时候让他和他的政治势力彻底消失了，苏联不需要改革，她需要的是一场革命！"
SOV_Special_operation_against_former_member_states: "对前加盟国的特别军事行动"
SOV_Special_operation_against_former_member_states_desc: "苏联的经济是各个加盟国共同建设的，每个前加盟国退出联盟后经济都出现了不同程度的损害，事实证明只有联合起来才能让各个国家变得强大。我们会向他们请求回到苏联的怀抱，但倘若这些资产阶级分子要带着他们的资产和反动军队负隅顽抗，那么他们的人民会和我们一起把这群人吊死在路灯上！"
SOV_The_red_sun_has_just_risen_and_the_path_is_bright: "红日初升，其道大光"
SOV_The_red_sun_has_just_risen_and_the_path_is_bright_desc: "内部的自由主义已经被消灭，外部的帝国主义包围也解决了一半，是时候专心致志地把精力放在内政上了。尽管苏联的经济才稍有起色，尽管重建各地区的苏维埃需要时间，但我们重新团结在了马列主义的旗帜之下。我们抱着牺牲奉献的决心，要把苏联，这个世界上第一个无产阶级专制的社会主义国家，再一次建成世界无产阶级的灯塔，为世界无产阶级照亮他们革命的道路。"
SOV_The_30th_Party_Congress: "第三十次党代表大会"
SOV_The_30th_Party_Congress_desc: "苏共三十大如期召开，伴随着政治动荡的结束，本次大会将对过去的进行总结并对联盟的未来进行规划。正式确立马列主义的纲领，统一全党思想，为苏维埃的发展与斗争划定根本方向。"
SOV_No_longer_alone: "不再孤独"
SOV_No_longer_alone_desc: "过去的很多年里，马列主义分子都不能很好地进入决策层，如今我们重掌党和国家最高领导权，我们怀揣着热情，会终结修正主义路线的摇摆，让苏维埃不再陷入孤立与迷途。"
SOV_Enemy_of_the_people: "人民之敌"
SOV_Enemy_of_the_people_desc: "一切妄图颠覆无产阶级专政、背叛社会主义的势力，都是苏联人民的死敌。我们必须亮明立场，对这些敌对势力予以坚决打击。通过改革安全机关，我们能消灭这些人民公敌，让红星再度闪耀。"
SOV_Ministry_of_Empowerment_and_Internal_Affairs: "赋权内务部"
SOV_Ministry_of_Empowerment_and_Internal_Affairs_desc: "安全部门对整个联盟来说都至关重要，他是联盟国防、生产、动员、组织的必备工具。然而克格勃权力过度垄断，基层监察严重缺位。我们改组检察机关，扩大内务部法定职权，让监察机关更好地互相配合，同时改革基层监察体系，织密权力监督网络。"
SOV_Crack_down_on_corrupt_officials: "打击腐败官僚"
SOV_Crack_down_on_corrupt_officials_desc: "腐败在任何时候都是党和人民的敌人，令人遗憾的是我们的监察机关对官员转移财产，官官相护等逃避措施无可奈何。如今我们对内务部进行现代化改革，通过对官员名下财产和资金的追踪和扣押，这些物证将会把所有贪腐分子全部送进监狱。"
SOV_Eradicate_spiritual_opium: "铲除精神鸦片"
SOV_Eradicate_spiritual_opium_desc: "宗教势力无序扩张，用精神鸦片侵蚀群众、动摇意识形态根基。我们发起宣传攻势，强化宗教活动管控，坚决遏制宗教扩张势头。"
SOV_Reorganize_the_informant_network: "重组线人网络"
SOV_Reorganize_the_informant_network_desc: "线人网络的组织一直不那么尽如人意，不过他们的确有一定的作用，我们会优化并重组线人网络，让线人更加专业、隐蔽、忠诚。"
SOV_The_battle_is_between_the_words: "战斗在文字间"
SOV_The_battle_is_between_the_words_desc: "比起身体上的战斗，在建设社会主义的时代对公文的战斗更加普遍。我们会培养教育干部和积极分子的文书能力，让群众能更好的管理国家。"
SOV_Suppress_the_revisionists: "遏制修正主义分子"
SOV_Suppress_the_revisionists_desc: "在建设社会主义这一长期的实践斗争中，我们不能一劳永逸地把修正主义消灭，但是我们会做出改变，阻止赫鲁晓夫这样的修正分子进入高层。"
SOV_As_cruel_as_the_dead_of_winter: "如严冬一般残酷"
SOV_As_cruel_as_the_dead_of_winter_desc: "无描述中国的雷锋同志曾经说过：“对待同志要像春天般的温暖，对待敌人要像严冬一样残酷无情。”面对阶级敌人，我们无需任何温情，要用严厉的手段去阻止他们，把他们送去古拉格！"
SOV_People_s_Party: "人民之党"
SOV_People_s_Party_desc: "斯大林曾说：“工人阶级的党如果不同群众保持广泛的联系，那它就不能成为能够领导千百万工人阶级群众和全体劳动群众的真正的群众性的党。”然而长期的官僚主义让党日渐脱离群众，我们必须进行大刀阔斧的改革，把不合格的人踢出，让党重新焕发活力，让它真正称为工农的党、人民的党。"
SOV_Recruit_activists: "吸纳积极分子"
SOV_Recruit_activists_desc: "斯大林曾经说过干部决定一切，这句话号召我们培养并爱惜工人干部。我们将运动中的先进分子、功勋斯达汉诺夫工人吸纳进各级管理岗位，充实无产阶级执政队伍，让无产阶级更多的管理国家。"
SOV_Criticism_and_Self_Criticism: "批评与自我批评"
SOV_Criticism_and_Self_Criticism_desc: "党内错误风气与党性滑坡问题日益凸显，我们将发起全党性的批评与自我批评运动，号召党员自查自纠、主动坦白，净化党内风气。自我批评对我们来说就像空气和水一样需要，没有自我批评，我们的党就无法前进。"
SOV_Going_into_the_grassroots: "走进基层"
SOV_Going_into_the_grassroots_desc: "一种很坏的情况是，党的干部困在办公室闭门指挥，这不仅仅是严重的官僚主义，更是先锋队里混入机会主义分子的信号。群众工作刻不容缓！我们会让干部深入基层、扎根群众，在一线开展领导工作，密切党群联系。重拾关于斯大林时代对工人群众的密切关心，再度让党和工人形成一个整体。"
SOV_Reaffirm_the_Party_s_discipline: "重申党的纪律"
SOV_Reaffirm_the_Party_s_discipline_desc: "如今许多党员对党纪的漠视到了一种地步，他们或多或少都有违背纪律谋取私利的想法。必须指出党是一个纪律严明的战斗的组织，这些不遵守纪律的人都会被清洗，宁要少些，也要好些。"
SOV_The_Party_leads_everything: "党领导一切"
SOV_The_Party_leads_everything_desc: "党是工人阶级的先锋队，是一切组织中最高级的组织形式，它完全能够领导、而且也应该领导工人阶级的其余一切组织。列宁这么教导我们，党要领导阶级专政，要领导但不取代苏维埃，领导经济与文化。我们将贯彻这一思想，与任何违背列宁主义的行为做斗争。"
SOV_Ensure_purity: "保证纯洁性"
SOV_Ensure_purity_desc: "一个革命的斗争的有纪律的组织不可避免的会混入机会主义分子，他们或有意或无意地在破坏我们的党。清洗是党的自我批评的表达，是其最高形式，我们需要并且一直需要把党的机会主义分子清除出去，保证我们党的纯洁性。"
SOV_Revisiting_class_struggle: "重提阶级斗争"
SOV_Revisiting_class_struggle_desc: "斯大林时代不成熟的资本主义残余理论被毛泽东时代的中国发展了，在无产阶级专政的社会主义国家内，资产阶级法权在被消灭之前，阶级斗争一定会存在，这种斗争包含各种多样的方面，并且长期且复杂。我们鼓动所有劳动人民警惕资本主义，学习斗争理论，避免修正主义再临。"
SOV_Ensure_ideological_unity_within_the_Party: "保证党内思想统一"
SOV_Ensure_ideological_unity_within_the_Party_desc: "没有思想上的统一，组织统一是没有意义的。自由主义等资产阶级思想在蔓延，我们会通过说服教育的民主办法和开除批评的集中办法，来确保全党在思想上高度统一。"
SOV_Implement_the_system_of_democratic_centralism: "落实民主集中制"
SOV_Implement_the_system_of_democratic_centralism_desc: "民主集中制是对组织办法的辩证法，没有民主我们不能团结群众，没有集中我们不能组织工作。这一共产主义思想要被落实是不易的，但我们会推动”辩论“、”说服“的民主制度来丰富我们已经建立的党组织。"
SOV_Among_the_People: "人民之中"
SOV_Among_the_People_desc: "政府，也即苏维埃，是劳动者里的先进分子组成的，无产阶级专政的国家机器。这台巨大的机器拥有无穷的潜力，然而现在他却几近停转，人民对苏联的信心正在被不断地失败磨灭，唯有进行彻底的改组，人民才会再次和国家团结起来。"
SOV_Limited_local_autonomy: "地方有限自主权"
SOV_Limited_local_autonomy_desc: "赫鲁晓夫、勃列日涅夫、亚纳耶夫他们做了很多改革，其中最大的错误就是盲目的为了所谓经济活力给地方放权，事实上这不仅仅是助长了资本主义在苏联的复辟，更是为了眼前的短期利益违背的社会主义根本的制度！如今我们将明确地方政府到底有哪些权力，任何阻止中央收回这些权力的人都是在破坏社会主义"
SOV_Education_reform: "教育改革"
SOV_Education_reform_desc: "不知何时开始，我们的教育系统里出现了很多自由主义分子，不仅仅是普通教育的老师，甚至是教授也有这种情况。除了对知识分子的清洗以外，我们迫切地需要变革现有体制，让意识形态的政治氛围更加浓厚。"
SOV_Reform_the_reporting_system: "改革举报制度"
SOV_Reform_the_reporting_system_desc: "群众的举报一直是我们联盟重要的民主办法，是无产者参与国家治理的办法之一。然而更多时候人民无法获得回应，他们的举报热情也所剩无几了。我们要扩大并改革我们的申诉局，通过更加高效的调查的处理信件，我们会用实际行动来证明我们能够处理好人民的声音！" 
SOV_Socialist_competition: "社会主义竞赛"
SOV_Socialist_competition_desc: "不仅仅在生产领域，在脑力劳动者里也可以有社会主义竞赛。通过或物质或精神的激励，更多的无产者会被鼓动起来学习知识，而他们也会用这股热情让政府的运转效率火热起来。"
SOV_Modernized_postal_and_telecommunications_department: "现代化邮电部门"
SOV_Modernized_postal_and_telecommunications_department_desc: "除了提高政府机构的效率，我们也要提高信息的运输效率。邮电部门作为苏联重要的信息部门，是时候进行现代化了，互联网的在苏联的初步建设成果将被部署在这里，让信息顺着网线光速传播吧。"
SOV_Abolish_redundant_offices: "撤销冗余办公室"
SOV_Abolish_redundant_offices_desc: "是时候了，让勃列日涅夫时代增加的1000个高级干部席位全都见鬼去吧，让十五个副部长全部滚出去！这种对人力资源和国家资源的浪费就此终结，我们会确立办公室存在的意义并用更加科学的办法来分配我们的干部。"
SOV_Pilot_grassroots_democracy: "试行基层民主"
SOV_Pilot_grassroots_democracy_desc: "社会主义民主是什么样子，苏联搞了很久也没搞懂，或许斯大林的思路比较好，可惜后面被篡改了。社会主义民主的核心是让劳动者掌握最高到最低的政治组织，通过对斯大林提出的投票办法进行改变，我们将尝试让更多的积极分子被选举进入重要的部门，如同工会民主运动那样。培养干部和苏维埃的选举都需要时间，我们会循序渐进。"
SOV_The_Voice_of_the_Ordinary_Person: "“小人物”的声音"
SOV_The_Voice_of_the_Ordinary_Person_desc: "领袖来了又走，唯有那些名不见经传的小人物是永恒的。这些小人物是工作的基石，他们能看到很多克里姆林宫看不到的东西，通过越过中间管理层直接聆听小人物的声音，我们可以更好地了解国家的全貌，更好的为人民服务。"
SOV_Millennium_Constitution: "千禧年宪法"
SOV_Millennium_Constitution_desc: "斯大林同志认为，宪法是对社会主义取得的光辉成果进行一次总结和标准化。和1977年的宪法不同，我们这次新宪法参考的更多是1936年的斯大林宪法，否定了修正主义理论，如发达社会主义，扩建了社会主义的新理论，如毛泽东同志的继续革命理论。这次宪法代表了苏联已经彻底从修正主义里挣脱，我们现在能清晰并骄傲的宣布什么是社会主义了。"
SOV_Soviet_Union_of_Brothers_Republics: "苏维埃兄弟共和国"
SOV_Soviet_Union_of_Brothers_Republics_desc: "尽管在过去，很多地方爆发了分离主义叛乱，并且很多共和国之间有着裂隙。但随着我们的改革和社会进步，裂痕正在愈合。通过宣传和实际行动。各个民族团结一心，各个加盟国情同手足的理想状态将再度重现。"
SOV_The_brightest_future: "最美好的前途"
SOV_The_brightest_future_desc: "啊，最美好的前途，可不要对我冷酷！\n可不要对我冷酷，不要冷酷！\n我就从零点起步，向最美好的前途\n向最美好的前途，哪怕是漫长的路"
SOV_Reform_the_Communist_Youth_League: "改革共青团"
SOV_Reform_the_Communist_Youth_League_desc: "青年团是党的忠实助手和战斗后备军。其主要目标是对青年进行共产主义教育，然而过去有着一种十分有害的思想，过去的革命伟大而模糊，现在的生活更加重要。这是修正主义和社会主义交织导致的社会割裂，我们会让过去不利于青年和工人阶级联系起来的政策被废除，让青年更多地参与生产实践斗争，让他们切实地认可共产主义思想。"
SOV_The_Return_of_the_Accounting_Ruble: "经济复苏三年计划"
SOV_The_Return_of_the_Accounting_Ruble_desc: "经济复苏三年计划"
SOV_Reform_the_State_Planning_Commission: "记账卢布的回归"
SOV_Reform_the_State_Planning_Commission_desc: "记账卢布的回归"
#事件
cccp.1.t: "安德烈耶娃对全联盟的讲话"
cccp.1.d: "各位同志们！光荣的劳动者们！保卫祖国的海陆空军战士们！\n\n二〇〇〇年到来的钟声正鸣响在我们这个星球的寥廓上空。人类文明的发展，即将进入一个新千年。今夜，在世界的东方与西方、南方与北方，各国劳动人民无分民族、无分信仰，都在为这一历史时刻的来临而欢欣鼓舞。\n\n首先，我谨代表苏维埃联盟共产党向社会主义祖国致以最美好的祝福，向全国各族同胞祝贺新年快乐！\n\n回望昨日时光，人类历史几经波折，风云变幻。我们从刀耕火种走向工业巨兽，我们从一家天下走向共和之路，我们从穷困潦倒走向富足安康。社会主义建设有条不紊，共产主义未来近在咫尺。\n\n同胞们！公民们！当今生活是来之不易的。我们的先烈们为全国人民的幸福而艰苦奋斗：历经列宁同志领导下的十月革命和流血内战，历经斯大林同志指挥下的伟大的卫国战争，历经赫鲁晓夫和勃列日涅夫同志规划下的现代化建设，历经戈尔巴乔夫的叛变和亚纳耶夫同志的力挽狂澜，我们种下并保卫了革命果实，且比任何时候都有信心继续浇灌好它。无论如何，我们的前途是光明的，但道路是曲折的。全国范围内依然有许多事务亟待处理，建设未来依旧任重道远。但进步终究要战胜落后，科学终究要战胜愚昧，正义终究要战胜邪恶，这是历史不断昭示人们的科学真理。我们坚信：共产主义社会的到来是不可阻挡的......\n\n最后，我们希望，在未来的世界，各个国家和各个民族能够始终和睦相处、友好合作、共同发展，能够建立起公正合理的国际政治经济新秩序，能够实现持久和平和普遍繁荣，各国人民都能够按照自己的意愿创造并享受美好的生活。世界经济正不断复苏并焕发新生，这是历史发展的必然趋势，也是各国人民的共同愿望。我们坚信，在新世纪里，苏联人民将会继续沿着马克思列宁主义道路挥洒汗水，建成繁荣！\n\n让我们一起，祝愿祖国繁荣昌盛、世界和平安宁！"
cccp.1.a: "这个可比亚纳耶夫的新年祝贺有意思了"
cccp.2.t: "对过去四十年的反省"
cccp.2.d: "千禧年，也就是2000年，距离挽救联盟已走过9年，距离保卫联盟已历经55年，距离建立联盟已途经76年。\n\n过去40年里，在赫鲁晓夫，勃列日涅夫，安德罗波夫，契尔年科以及亚纳耶夫同志的带领下，苏维埃联盟度过了一段有惊无险的时光。\n\n客观的说，赫鲁晓夫和勃列日涅夫的改革是不尽人意的。联盟遗留了自斯大林时代就有的轻重工业严重失调和民族矛盾激化的问题。在波罗的海沿岸，爱沙尼亚与拉脱维亚相继宣布独立；在外高加索，格鲁吉亚和阿塞拜疆与祖国分庭抗礼。其它未曾独立的地区也不见得忠心耿耿。总而言之，联盟内部各民族不至于是剑拔弩张的关系，但昔日那样团结一致的兄弟情谊早已一去不复返了。赫鲁晓夫同志与勃列日涅夫同志误判了联盟的经济形势，使得祖国的轻工业发展举步维艰。自亚纳耶夫同志执政以来，由于忙于处理内政外交问题，联盟的经济陷入停滞乃至于倒退，工业情况进一步恶化。农业生产也无法解决人民群众日益高涨的需求——换句话说，人们的肚子饿的速度比我们烤面包的速度更快。\n\n然而可喜可贺的是祖国傲人的军队以及其配套的军事工业。赫鲁晓夫和勃列日涅夫同志在冷战时为我们留下了一笔丰厚的遗产，使我们还有资格屹立于世界之林，染指国际事务。依靠对外军售，我们尚且能获得一笔可观的收入。这笔收入可以大作文章，用于改善当前的经济情况。\n\n根据前40年乃至前70年的经验来看，当务之急是提高轻工业规模以及水准，使联盟轻重工业发展趋于平等。民族问题也不可大意，稍有不慎便会走向手足相残的道路。但无论如何，20世纪的联盟堪称世界一极，21世纪自然也该是属于联盟的世纪。道阻且长，行则将至，只有吸取过去的教训，才能清楚未来的方向。"
cccp.2.a: "最大的敌人——修正主义"
cccp.3.t: "秘密报告就是谬论"
cccp.3.d: "批判修正主义分子赫鲁晓夫的决议发出后，知识分子响应号召。一份由莫斯科国立大学牵头的项目发出公告，呼唤全世界的学者为斯大林辩护，并部分公开苏联国家档案，提纲如下：\n\n一、关于个人崇拜\n\n斯大林从未提倡个人崇拜，只是容忍，并且反对过度个人崇拜。赫鲁晓夫有意回避了斯大林本人的态度，把斯大林搞个人崇拜说成事实而不论证。赫鲁晓夫本人就是斯大林崇拜的鼓吹者，他多次称斯大林是天才，是他的父亲。赫鲁晓夫在几年内树立了比斯大林有过之而无不及的个人崇拜。\n\n二、大清洗\n\n任何人都不对大清洗负责，大清洗是在两个五年计划的快速工业化中，出现的矛盾的总爆发，宗教分子的反扑、工人反对官僚主义等都是其证据。大清洗扩大化的主要负责人是地方圈子，其代表赫鲁晓夫更处决了20万人成为最大的刽子手。大清洗造成了冤假错案，但是不包括很多高层。大清洗促进了工会民主，实现了工人参与管理和干部参与劳动。因此清洗是必要的。\n\n三、卫国战争\n\n指控斯大林误判纳粹入侵时间毫无道理，没人能保证一定判断成功。所谓证据都被斯大林知晓并且交由政治局讨论。斯大林没有在卫国战争初期惊慌失措，他自始至终都努力地工作，冷静地决策，为卫国战争立下了汗马功劳。斯大林没有针对朱可夫进行打压。\n\n四、民族政策\n\n二战中苏联的民族迁移政策被赫鲁晓夫用于攻击斯大林背叛了列宁的民族政策，他宣称“没有任何例外”、“与军事考虑没有任何关系”等。必须澄清：存在不少搬迁人员“例外”。搬迁保障了红军后方的安全。被迁移民族大部分支持了纳粹，参与了反苏起义行动。死亡率不足0.5%，在战争时期难得可贵。\n\n五、指控赫鲁晓夫\n\n赫鲁晓夫在大清洗期间，不断扩大化反革命的范围，造成冤假错案。在改革时不断一意孤行，破坏斯大林的自然改造计划、放任梁赞奇迹的诞生，以至于让联盟的农业收到了重创。乱改工业，破坏了社会主义公有制，取消了工业合作社，导致联盟轻工业萎缩，经济发展停滞。恶意销毁档案。。。。。。"
cccp.3.a: "伟大的领袖不会被打垮"
cccp.4.t: "与亚佐夫的访谈"
cccp.4.d: "苏联共产党中央委员会 谈话记录\n\n时间：2000年X月X日 14:30 地点：克里姆林宫 327办公室 与会人员：\n\n 季米特洛夫同志（中央书记处书记）\n\n 德米特里·季莫费耶维奇·亚佐夫同志（苏联元帅）\n\n谈话内容摘要：\n\n季米特洛夫：亚佐夫同志，首先感谢您在拯救联盟运动中的贡献。但是最近，中央注意到军队部分人员近期存在思想动摇，尤其在对待党中央最新决议时表现出不应有的迟疑。您作为高级将领，应明确立场。\n\n亚佐夫：军队始终忠于联盟，也会在联盟需要时挺身而出，我没什么好说的。\n\n季米特洛夫：亚佐夫同志，忠诚不仅要表态，更要体现为绝对服从。戈尔巴乔夫也曾声称他对联盟的忠诚，会将联盟带往繁荣，可现在他又怎么样了呢？\n\n（停顿）\n\n季米特洛夫：总而言之，中央要求军方彻底清除任何偏离路线的倾向，尤其是历史上曾出现的“军事特权思想”。\n\n亚佐夫：军队系统一直严格遵守纪律。\n\n季米特洛夫：军队是联盟的保障，联盟从来不会忽视军队建设发展情况。而中央需要的是实际行动，亚佐夫同志。您个人在1991年事件中的角色，中央是肯定的。但历史功绩不能成为特殊化的理由。\n\n（长时间沉默）\n\n亚佐夫：…明白。军队将继续致力于保卫联盟。\n\n季米特洛夫："
cccp.4.a: "再见，合作愉快。"
cccp.5.t: "科索拉波夫的一天"
cccp.5.d: "三月的莫斯科还未褪去冬意，真理报街角积着残雪，日光洒过就化成了细流，顺着石板渗到泥土里。白杨树的枝权间冒出星星点点的绿芽，风渐渐褪去了刺骨的寒冷，裹着点潮湿的暖意，吹得人领口发松。街角的宣传画换了新内容，红底白字印着党的新号召一回归传统路线，在残雪映衬下格外醒目。\n\n科索拉波夫挤下地铁，将新下发的任命文件抱在胸前，但手指还是无意识的去摩挲着任命文件的边缘。看着大楼正对面克宫的红星，他放慢了脚步。四十八年过去，弹指一挥间，斯大林同志走了几乎有半个世纪了。联盟也经历了风风雨雨，先是苏共二十大，后来又是戈尔巴乔夫的什么改革，搞的社会上各种修正思潮都出现一遍了。自己的命运也是，从戈尔巴乔夫宣布改革以来，自己的反对，也成了他解职的借口.想着想着，科索拉波夫走到了大楼的门口，简单交涉了几句并出示了任命文件后，门卫便放他进入了建筑。\n\n拿出了总书记的信和任命状，放好要阅读的往期的真理报，克索拉波夫便开始了一天的工作"
cccp.5.a: "恢复这些同志的职务是必要的"
cccp.6.t: "修正主义再批判"
cccp.6.d: "阿列克谢每天都会买一份真理报，因为他即将参加共青团考试，他相信抄真理报就能够通过考试，这是他爸爸告诉他的，之所以想加入共青团也是因为他爸爸说加入共青团会有很多优先权。今天的报纸头条是一篇从没见过文章《驳斥修正分子勃列日涅夫和赫鲁晓夫对斯大林同志的抹黑》，他一脸茫然地阅读文章，不尊重客观事实，不符合社会主义公有制，对斯大林的无端抹黑等等字眼反复出现，翻过报纸，确认了自己看的确实是真理报。阿列克谢回想起教材上对勃列日涅夫时代“发达社会主义”的赞美和对赫鲁晓夫的颂歌，又看看报纸上的“腐败与僵化”和“主观主义、修正主义分子”，困惑地抬起头，要知道几年前真理报头条甚至是明星和选美比赛。蓝天没能告诉他该遵从哪一根准绳，是新的风向还是旧的标准？\n\n“嘿，阿列克谢，你看最新的真理报了吗？”同学们找到了他，“你觉得我们的新总书记这么说会不会影响到团考？”阿列克谢摸摸下巴，思索片刻说：”我觉得总书记应该是想要考验辩证能力，那种好处坏处的解题思路。我们应该想想斯大林时代、赫鲁晓夫时代、勃列日涅夫时代都有那些好处坏处，这些教材上面可没有。“几人讨论了很久，从集体化到肃反，从卫国战争到二十大报告，从赫鲁晓夫改革到柯西金改革，他们自己都不知道，自己能这么在乎意识形态的问题。\n\n同学们对意识形态问题可没这么感兴趣，他们只知道共青团的考试变得更难了，以前只需要背报纸就行了，“真见鬼！为什么这个时候把考试难度提高。”"
cccp.6.a: "共青团的共回来了吗"
cccp.7.t: "给予普京的信"
cccp.7.d: "苏联共产党中央委员会\n\n莫斯科，克里姆林宫\n\n2000年X月X日\n\n致普京同志\n\n亲爱的普京同志：\n\n值此新千年之际，请允许我代表苏联共产党中央委员会向您致以诚挚的敬意与充分的肯定。\n\n苏共中央认为，在推翻戈尔巴乔夫、保卫苏联的伟大斗争中，您作出了重要贡献。我们坚信，您始终怀着对苏维埃联盟的赤诚之心，恪守捷尔任斯基同志所创立的内务部光荣传统。\n\n然而，危机尚未结束，苏联仍处于关键时刻。国内外的反动势力和修正主义分子仍潜伏在暗处，伺机颠覆我们伟大的联盟。普京同志，我们希望您能继续恪尽职守，捍卫苏联不受任何敌人的侵犯。\n\n斯大林同志曾指出：“堡垒最容易从内部攻破。”因此，我们必须始终保持高度警惕，以钢铁般的意志和坚决的手段，清除一切危害联盟社会主义制度的敌人。克格勃不仅是国家的盾牌，更是革命的利剑，其一切行动都必须服务于工人阶级与党的最高利益。\n\n当前，应特别重视以下几个方面：\n\n1. 联盟内部反对派的阴谋活动；\n\n2. 民族主义与分离主义势力的抬头；\n\n3. 经济领域的破坏行为；\n\n4. 国外敌对分子的渗透与颠覆。\n\n最后，请您谨记：无论为了联盟的人民，还是我们共同的伟大理想，普京同志，请您坚定不移，领导克格勃继续捍卫联盟，确保共产主义伟大事业的最终胜利！\n\n荣誉与胜利属于苏联！\n\n致以同志式的敬礼！"
cccp.8.t: "改革家最后的一天"
cccp.8.d: "“鉴于独立国家联合体的现状，我终止自己以苏联总统...”戈尔巴乔夫猛的惊醒，四处转头，见自己还在监狱里面，涣散的瞳孔才逐渐聚焦。至于发生了什么，他也明白，自从他被那次事件的混蛋们“请出”克宫后，他就来到了这里，并每天晚上都在做各种各样无厘头的梦，有时候是自己在拍广告，有时候是一个人窝在别墅里看电视，有时候...不过时间也容不得想了，因为苏联人民在经历这两次失败的改革后可容不得这位“改革家”还活着了，所以根据公审结果，戈尔巴乔夫也难逃一死了。\n\n下午三点，死刑如期进行，戈尔巴乔夫上了十字架，寒风吹的他打了个寒战。他闭上了眼睛，眼前闪过青年时代意气风发的他，最后定格在了八月十九号士兵冲进克宫的画面。枪响的那一刻，他也明白了，改革在苏联到头了。"
cccp.8.a: "再见，改革家先生"
cccp.9.t: "配给制度的提案"
cccp.9.d: "安德烈耶娃没想到自己成为总书记之后的第一个重大决策是决定配给制。报告显示，由于联盟的经济停滞过久，如今已经面临崩溃的边缘。。。或许已经崩溃了，毕竟市场价格已经是指导价格的一倍多了。而联盟货币的信用也在通货膨胀下贬值，经济学家的建议是逐步推进配给制和大量购买外国商品。但这么做会不会使得政府的信用更加减少呢？经过讨论，总书记决定。"
