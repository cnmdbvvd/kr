SOV_yanayev_s_final_weeks: "亚纳耶夫的辞呈"
SOV_yanayev_s_final_weeks_desc: "在1991年的动荡岁月中，根纳季·亚纳耶夫通过一场政变登上了苏联的权力之巅，他肩负着挽救我们亲爱的祖国免于分崩离析的重任，并力图恢复其昔日的荣光。然而，自那些命运攸关的八月末日子以来，他的承诺如同泡影，经济的复苏从未降临，波罗的海人民的抵抗未曾停歇，我们依旧只是往昔辉煌的一道残影。这个伟大的国家正呼唤着一次涅槃，如果根纳季·亚纳耶夫真心热爱他的祖国，那他就知道自己该做什么。"
